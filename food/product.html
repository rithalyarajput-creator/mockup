<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Daddy of Tastes</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>
      Daddy <span>of Tastes</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a><a href="menu.html">Menu</a>
      <a href="about.html">About</a><a href="contact.html">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="btn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
      <a href="cart.html"><button class="cart-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Cart <span class="cart-count">0</span></button></a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>
<div class="mobile-menu">
  <a href="index.html">Home</a><a href="menu.html">Menu</a><a href="cart.html">Cart</a>
</div>

<div class="product-page" id="product-page">
  <div class="container">
    <!-- Breadcrumb -->
    <div class="breadcrumb" style="margin-bottom:24px">
      <a href="index.html">Home</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <a href="menu.html">Menu</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span id="bc-name">Loading...</span>
    </div>

    <!-- Product Layout -->
    <div class="product-layout" id="product-layout">
      <!-- Filled by JS -->
    </div>

    <!-- Related Products -->
    <div style="margin-top:64px">
      <h3 class="section-title">You May Also Like</h3>
      <div class="food-grid" id="related-grid"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 Daddy of Tastes. All rights reserved.</p>
      <div style="display:flex;gap:20px"><a href="#">Privacy</a><a href="#">Terms</a></div>
    </div>
  </div>
</footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/main.js"></script>
<script>
let qty = 1;
const id = new URLSearchParams(window.location.search).get('id');
const p = getProduct(id);

if (!p) {
  document.getElementById('product-layout').innerHTML = `
    <div style="text-align:center;padding:60px;grid-column:1/-1">
      <h2 style="margin-bottom:12px;color:var(--text-dark)">Product not found</h2>
      <a href="menu.html" class="btn btn-primary">Back to Menu</a>
    </div>`;
} else {
  document.title = p.name + ' | Daddy of Tastes';
  document.getElementById('bc-name').textContent = p.name;

  const catLabels = {'starters':'Starters','chilly':'Chilly Items','main-course':'Main Course','south-indian':'South Indian','sweets':'Sweets','beverages':'Beverages'};
  let activeTab = 'desc';

  function renderTabs() {
    document.getElementById('tab-desc').classList.toggle('active', activeTab==='desc');
    document.getElementById('tab-nutri').classList.toggle('active', activeTab==='nutri');
    document.getElementById('tab-ingr').classList.toggle('active', activeTab==='ingr');
    document.getElementById('tab-content').innerHTML = activeTab === 'desc'
      ? `<p>${p.fullDesc}</p>`
      : activeTab === 'nutri'
      ? `<div class="nutrition-grid">
          <div class="nutrition-item"><h4>${p.nutrition.calories}</h4><p>Calories</p></div>
          <div class="nutrition-item"><h4>${p.nutrition.protein}</h4><p>Protein</p></div>
          <div class="nutrition-item"><h4>${p.nutrition.carbs}</h4><p>Carbs</p></div>
          <div class="nutrition-item"><h4>${p.nutrition.fat}</h4><p>Fat</p></div>
        </div><p style="margin-top:14px;font-size:12px;color:var(--text-light)">Per serving. Values are approximate.</p>`
      : `<p>${p.ingredients}</p>`;
  }

  document.getElementById('product-layout').innerHTML = `
    <!-- LEFT: Images -->
    <div>
      <div class="product-img-main">
        <img id="main-img" src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=600&q=80'">
      </div>
      ${p.imgs.length > 1 ? `
      <div class="product-thumbs">
        ${p.imgs.map((img, i) => `<div class="product-thumb ${i===0?'active':''}" onclick="switchImg(this,'${img}')"><img src="${img}" onerror="this.src='https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=100'"></div>`).join('')}
      </div>` : ''}
    </div>

    <!-- RIGHT: Info -->
    <div class="product-info">
      <div class="product-badges">
        ${p.badge ? `<span class="badge ${p.badge==='bestseller'?'badge-hot':p.badge==='new'?'badge-new':'badge-offer'}">${p.badge==='bestseller'?'Best Seller':p.badge==='new'?'New Item':p.badge==='popular'?'Popular':'Special'}</span>`:''}
        <span class="badge ${p.veg?'badge-veg':'badge-nonveg'}">${p.veg?'Veg':'Non-Veg'}</span>
        <span class="tag" style="font-size:11px">${catLabels[p.category]||p.category}</span>
      </div>

      <h1>${p.name}</h1>

      <div class="p-rating">
        <span class="stars">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5-Math.floor(p.rating))}</span>
        <strong>${p.rating}</strong>
        <span class="count">(${p.reviews.toLocaleString('en-IN')} reviews)</span>
      </div>

      <div class="product-price-row">
        <span class="product-price">${p.price}</span>
        ${p.oldPrice ? `
        <span class="product-old-price">${p.oldPrice}</span>
        <span class="product-save">Save ₹${p.oldPrice - p.price}</span>` : ''}
      </div>

      <p class="product-desc">${p.desc}</p>

      <ul class="product-details-list">
        <li>
          <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
          <span>Delivery Time: <strong>${p.time}</strong></span>
        </li>
        <li>
          <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          <span>Serves: <strong>${p.serves}</strong></span>
        </li>
        <li>
          <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${p.spice==='None'?'var(--text-light)':p.spice==='Mild'?'var(--green)':p.spice==='Hot'||p.spice==='Very Hot'?'var(--red)':'var(--accent)'}" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 8v4l3 3"/></svg></span>
          <span>Spice Level: <strong style="color:${p.spice==='None'?'var(--text-muted)':p.spice==='Mild'?'var(--green)':p.spice==='Hot'||p.spice==='Very Hot'?'var(--red)':'var(--accent)'}">${p.spice}</strong></span>
        </li>
      </ul>

      <div class="product-divider"></div>

      <div class="qty-row">
        <label>Quantity:</label>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeProductQty(-1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
          </button>
          <span class="qty-num" id="p-qty">1</span>
          <button class="qty-btn" onclick="changeProductQty(1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </div>

      <div class="product-actions">
        <button class="btn btn-primary btn-lg" onclick="addToCartProduct()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Add to Cart — ₹<span id="total-price">${p.price}</span>
        </button>
        <button class="btn btn-outline" onclick="toggleWishlist(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Save
        </button>
      </div>

      <!-- Trust badges -->
      <div style="display:flex;gap:20px;margin-top:20px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Fresh & Hygienic
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          No Artificial Colours
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          FSSAI Certified
        </div>
      </div>

      <div class="product-divider"></div>

      <!-- Tabs -->
      <div class="product-info-tabs">
        <span class="p-tab active" id="tab-desc" onclick="switchTab('desc')">Description</span>
        <span class="p-tab" id="tab-nutri" onclick="switchTab('nutri')">Nutrition</span>
        <span class="p-tab" id="tab-ingr" onclick="switchTab('ingr')">Ingredients</span>
      </div>
      <div class="tab-content" id="tab-content">
        <p>${p.fullDesc}</p>
      </div>
    </div>`;

  // Related
  const related = getRelated(id, 4);
  if (related.length) {
    document.getElementById('related-grid').innerHTML = related.map(rp => `
      <div class="food-card" onclick="location.href='product.html?id=${rp.id}'">
        <div class="food-card-img">
          <img src="${rp.img}" alt="${rp.name}" onerror="this.src='https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=500&q=70'" loading="lazy">
          <div class="veg-indicator ${rp.veg?'veg':'nonveg'}"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg></div>
        </div>
        <div class="food-card-body">
          <div class="food-card-meta">
            <span class="food-rating"><span class="star">★</span> ${rp.rating}</span>
            <span class="food-time">${rp.time}</span>
          </div>
          <h3>${rp.name}</h3>
          <p>${rp.desc}</p>
          <div class="food-card-footer">
            <div class="food-price"><span class="price">${rp.price}</span></div>
            <button class="add-btn" onclick="event.stopPropagation();addToCart('${rp.id}','${rp.name.replace(/'/g,"\\'")}',${rp.price},'${rp.img}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
      </div>`).join('');
  }
}

function switchImg(el, src) {
  document.querySelectorAll('.product-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('main-img').src = src;
}
window.switchImg = switchImg;

function changeProductQty(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById('p-qty').textContent = qty;
  if (p) document.getElementById('total-price').textContent = (p.price * qty);
}
window.changeProductQty = changeProductQty;

function addToCartProduct() {
  if (!p) return;
  for (let i = 0; i < qty; i++) addToCart(p.id, p.name, p.price, p.img);
  showToast(p.name, `${qty} item(s) added to cart`);
}
window.addToCartProduct = addToCartProduct;

function switchTab(tab) {
  activeTab = tab;
  renderTabs();
}
window.switchTab = switchTab;

function renderTabs() {
  if (!p) return;
  ['desc','nutri','ingr'].forEach(t => document.getElementById('tab-'+t)?.classList.toggle('active', t===activeTab));
  const content = document.getElementById('tab-content');
  if (!content) return;
  if (activeTab === 'desc') content.innerHTML = `<p>${p.fullDesc}</p>`;
  else if (activeTab === 'nutri') content.innerHTML = `
    <div class="nutrition-grid">
      <div class="nutrition-item"><h4>${p.nutrition.calories}</h4><p>Calories</p></div>
      <div class="nutrition-item"><h4>${p.nutrition.protein}</h4><p>Protein</p></div>
      <div class="nutrition-item"><h4>${p.nutrition.carbs}</h4><p>Carbs</p></div>
      <div class="nutrition-item"><h4>${p.nutrition.fat}</h4><p>Fat</p></div>
    </div><p style="margin-top:12px;font-size:12px;color:var(--text-light)">Per serving. Values are approximate.</p>`;
  else content.innerHTML = `<p>${p.ingredients}</p>`;
}
</script>
</body>
</html>
