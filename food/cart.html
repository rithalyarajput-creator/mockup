<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Daddy of Tastes</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>Daddy <span>of Tastes</span></a>
    <div class="nav-links"><a href="index.html">Home</a><a href="menu.html">Menu</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
    <div class="nav-actions">
      <button class="btn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
      <a href="cart.html"><button class="cart-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Cart <span class="cart-count">0</span></button></a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>
<div class="mobile-menu"><a href="index.html">Home</a><a href="menu.html">Menu</a><a href="about.html">About</a><a href="cart.html">Cart</a></div>

<div class="cart-page">
  <div class="container">
    <div class="breadcrumb" style="margin-bottom:24px">
      <a href="index.html">Home</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <a href="menu.html">Menu</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Cart</span>
    </div>

    <div class="cart-layout">
      <div class="cart-items-section">
        <h2>Your Cart</h2>
        <div id="cart-items"><!-- rendered by JS --></div>

        <!-- Delivery options -->
        <div class="form-section" style="margin-top:20px">
          <h3 style="font-size:15px;display:flex;align-items:center;gap:8px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            Delivery Options
          </h3>
          <div style="display:grid;gap:8px">
            <label class="payment-option selected" style="cursor:pointer;margin:0">
              <input type="radio" name="delivery" value="standard" checked>
              <div class="payment-option-info"><h4>Standard Delivery</h4><p>30–40 min &nbsp;•&nbsp; ₹40</p></div>
              <span class="payment-icon" style="font-size:20px">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              </span>
            </label>
            <label class="payment-option" style="cursor:pointer;margin:0">
              <input type="radio" name="delivery" value="express">
              <div class="payment-option-info"><h4>Express Delivery</h4><p>15–20 min &nbsp;•&nbsp; ₹80</p></div>
              <span class="payment-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              </span>
            </label>
            <label class="payment-option" style="cursor:pointer;margin:0">
              <input type="radio" name="delivery" value="pickup">
              <div class="payment-option-info"><h4>Pickup from Store</h4><p>Ready in 15 min &nbsp;•&nbsp; FREE</p></div>
              <span class="payment-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </span>
            </label>
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div>
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>₹<span id="subtotal">0</span></span></div>
          <div class="summary-row"><span>Delivery Fee</span><span id="delivery-text"><span id="delivery">0</span></span></div>
          <div class="summary-row"><span>GST (5%)</span><span>₹<span id="tax">0</span></span></div>
          <div class="summary-row total"><span>Total</span><span>₹<span id="total">0</span></span></div>

          <div class="coupon-box">
            <input id="coupon-input" type="text" placeholder="Enter promo code...">
            <button class="btn btn-ghost btn-sm" onclick="applyCoupon()">Apply</button>
          </div>

          <a href="checkout.html">
            <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:15px;margin-bottom:12px">
              Proceed to Checkout
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </a>
          <a href="menu.html">
            <button class="btn btn-outline" style="width:100%;justify-content:center">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
              Continue Shopping
            </button>
          </a>

          <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;font-size:12px;color:var(--text-muted)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Secure & Encrypted Checkout
          </div>
          <div style="display:flex;justify-content:center;gap:10px;margin-top:12px;opacity:0.5">
            <svg width="28" height="18" viewBox="0 0 40 24" fill="none"><rect width="40" height="24" rx="4" fill="#1A1F71"/><text x="20" y="16" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">VISA</text></svg>
            <svg width="28" height="18" viewBox="0 0 40 24" fill="none"><rect width="40" height="24" rx="4" fill="#EB001B" opacity=".8"/><text x="20" y="16" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">MC</text></svg>
            <svg width="28" height="18" viewBox="0 0 40 24" fill="none"><rect width="40" height="24" rx="4" fill="#003087"/><text x="20" y="16" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">UPI</text></svg>
          </div>
        </div>

        <!-- Quick add -->
        <div class="cart-summary" style="margin-top:14px">
          <h3 style="font-size:15px;margin-bottom:14px">Frequently Ordered Together</h3>
          <div style="display:flex;flex-direction:column;gap:12px" id="quick-add"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer><div class="container"><div class="footer-bottom"><p>© 2025 Daddy of Tastes. All rights reserved.</p></div></div></footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/main.js"></script>
<script>
// Quick add suggestions
const suggestions = PRODUCTS.filter(p => p.badge === 'bestseller').slice(0,3);
document.getElementById('quick-add').innerHTML = suggestions.map(p => `
  <div style="display:flex;align-items:center;gap:10px">
    <img src="${p.img}" style="width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--border)" onerror="this.src='https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=60'">
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600;color:var(--text-dark)">${p.name}</div>
      <div style="font-size:12px;color:var(--primary);font-weight:700">₹${p.price}</div>
    </div>
    <button class="add-btn" style="width:30px;height:30px;font-size:14px;flex-shrink:0" onclick="addToCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.img}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>`).join('');
</script>
</body>
</html>
